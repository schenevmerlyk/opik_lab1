<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль - To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-4">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title">Профіль користувача</h2>
                <table class="table table-bordered mt-3" id="profileTable">
                    <tr><th>Ім'я</th><td id="profileName"></td></tr>
                    <tr><th>Email</th><td id="profileEmail"></td></tr>
                    <tr><th>Стать</th><td id="profileGender"></td></tr>
                    <tr><th>Дата народження</th><td id="profileDob"></td></tr>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
